<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Parrilla Los Hermanos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        .section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            text-align: center;
        }
        .stat-item b { display: block; font-size: 1.5rem; color: var(--primary); }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }
        .alert-success { background: rgba(46, 204, 113, 0.2); color: var(--primary); border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fas fa-tools"></i> Panel de Control</h1>
        <p style="text-align: center; color: #94a3b8;">Configuración de Parrilla Los Hermanos</p>

        <div class="section">
            <label>WhatsApp del Local (Formato: 54911...)</label>
            <input type="text" id="ws-number" placeholder="Ej: 5491122334455">
            <button class="btn" onclick="saveWS()"><i class="fas fa-save"></i> Guardar WhatsApp</button>
        </div>

        <div class="section">
            <label>Actualizar Menú (Archivo Excel)</label>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <button class="btn" style="background: #3b82f6;" onclick="processExcel()">
                <i class="fas fa-file-import"></i> Cargar Productos desde Excel
            </button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <b id="count-prod">0</b>
                <span>Productos</span>
            </div>
            <div class="stat-item">
                <b id="status-ws"><i class="fas fa-times-circle" style="color:#ef4444"></i></b>
                <span>WhatsApp</span>
            </div>
        </div>

        <div id="alert-msg" class="alert alert-success"></div>
        
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 30px; text-align: center;">
            Los datos se guardan en este navegador. Asegúrate de usar la misma PC/Navegador para administrar.
        </p>
    </div>

<script>
    window.onload = () => {
        updateStats();
        const savedWS = localStorage.getItem('ws_hermanos');
        if(savedWS) document.getElementById('ws-number').value = savedWS;
    };

    function updateStats() {
        const items = JSON.parse(localStorage.getItem('menu_hermanos')) || [];
        document.getElementById('count-prod').innerText = items.length;
        
        const ws = localStorage.getItem('ws_hermanos');
        document.getElementById('status-ws').innerHTML = ws ? 
            '<i class="fas fa-check-circle"></i>' : 
            '<i class="fas fa-times-circle" style="color:#ef4444"></i>';
    }

    function showAlert(text) {
        const el = document.getElementById('alert-msg');
        el.innerText = text;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function saveWS() {
        const num = document.getElementById('ws-number').value.trim();
        if(!num) return alert("Ingresa un número válido");
        localStorage.setItem('ws_hermanos', num);
        showAlert("¡WhatsApp guardado correctamente!");
        updateStats();
    }

    function processExcel() {
        const fileInput = document.getElementById('excel-file');
        const file = fileInput.files[0];
        if (!file) return alert("Selecciona un archivo Excel.");

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);

            if(jsonData.length > 0) {
                // Adaptamos las columnas del Excel que mostraste en la imagen
                const formattedData = jsonData.map(item => ({
                    nombre: item.Producto || item.producto || item.nombre,
                    precio: item.Precio || item.precio,
                    categoria: item.Categoria || item.categoria,
                    descripcion: item.Descripcion || item.descripcion || "",
                    imagen: item.ImagenURL || item.imagen || "",
                    disponible: (item.Disponible === "SI" || item.Disponible === "si" || item.Disponible === true),
                    destacado: (item.Destacado === "SI" || item.Destacado === "si" || item.Destacado === true),
                    sugerencia: item.Sugerencia_IA || item.sugerencia || "",
                    tags: item.Tags || item.tags || ""
                }));

                localStorage.setItem('menu_hermanos', JSON.stringify(formattedData));
                showAlert(`¡Listo! Se cargaron ${formattedData.length} productos.`);
                updateStats();
            } else {
                alert("El archivo está vacío o no tiene el formato correcto.");
            }
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
