<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Menú Digital Inteligente por QR</title>
<meta name="description" content="Hacé tu pedido online en Restaurante a un clic de distancia.">

<meta property="og:type" content="website">
<meta property="og:title" content="🍽️ Menú Online">
<meta property="og:description" content="Elegí tus menú favorito y enviá tu pedido por WhatsApp de forma fácil y rápida.">

<meta property="og:image" content="https://raw.githubusercontent.com/cursosmenos20grados/catalogo/main/moza_robot.jpg"
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catalogo">
<link rel="icon" href="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true">
<link rel="apple-touch-icon" href="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true">
   
    <title>Panel Admin | Helados.mix</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #2ecc71; }
        .no-stock { border-left-color: #e74c3c; opacity: 0.6; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-edit { background: #3498db; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 0.8em; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #334155; padding: 15px; border-radius: 10px; text-align: center; }
        .precio { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>Control Cafeteria</h2>
    <a href="https://docs.google.com/spreadsheets/d/19C3LcmEyUhJ-feULW6wa-vgGkXbmJAsCP84cYnK_5ZU/edit" target="_blank" class="btn-edit">📝 EDITAR EXCEL</a>
</div>

<div class="stats">
    <div class="stat-box">
        <small>Productos Activos</small>
        <h3 id="count-active">0</h3>
    </div>
    <div class="stat-box">
        <small>Sin Stock</small>
        <h3 id="count-inactive" style="color:#e74c3c">0</h3>
    </div>
</div>

<div id="admin-lista">Cargando inventario...</div>
<div style="
    text-align: center; 
    margin: 30px auto; 
    padding: 25px; 
    background: rgba(30, 41, 59, 0.5); 
    border-radius: 20px; 
    border: 1px solid rgba(46, 204, 113, 0.3);
    max-width: 300px;
    backdrop-filter: blur(10px);
">
    <p style="color: #94a3b8; font-size: 0.9em; margin-bottom: 15px; font-weight: bold;">
        📲 TU CÓDIGO QR OFICIAL
    </p>
    
    <div style="background: white; padding: 10px; border-radius: 12px; display: inline-block;">
        <img src="https://github.com/cursosmenos20grados/catalogo/blob/main/qr-code.jpg?raw=true" 
             alt="QR Helados.mix" 
             style="width: 200px; height: 200px; display: block; border-radius: 5px;">
    </div>

    <p style="color: #2ecc71; font-size: 0.75em; margin-top: 15px; word-break: break-all; opacity: 0.8;">
        https://cursosmenos20grados.github.io/catalogo/1.html
    </p>
    
    <a href="https://github.com/cursosmenos20grados/catalogo/blob/main/qr-code.jpg?raw=true" 
       download="QR-HeladosMix.jpg" 
       style="
            display: inline-block; 
            margin-top: 10px; 
            padding: 8px 15px; 
            background: #2ecc71; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 0.8em; 
            font-weight: bold;
       ">
       📥 DESCARGAR QR
    </a>
</div>
<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv';

    async function cargarAdmin() {
        const res = await fetch(CSV_URL);
        const data = await res.text();
        const filas = data.replace(/\r/g, "").split('\n').slice(1);
        
        const productos = filas.map(f => {
            const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return {
                nombre: c[2] ? c[2].replace(/"/g, "") : "Sin nombre",
                precio: c[4] || "0",
                disp: c[6] ? c[6].toUpperCase().trim() : "NO"
            };
        }).filter(p => p.nombre !== "Sin nombre");

        const cont = document.getElementById('admin-lista');
        cont.innerHTML = "";
        
        let activos = 0;
        let inactivos = 0;

        productos.forEach(p => {
            const esActivo = p.disp.includes("SI");
            if(esActivo) activos++; else inactivos++;

            cont.innerHTML += `
                <div class="card ${esActivo ? '' : 'no-stock'}">
                    <strong>${p.nombre}</strong><br>
                    <span class="precio">$${p.precio}</span> | 
                    <span>${esActivo ? '✅ EN VENTA' : '❌ PAUSADO'}</span>
                </div>`;
        });

        document.getElementById('count-active').innerText = activos;
        document.getElementById('count-inactive').innerText = inactivos;
    }

    cargarAdmin();
</script>
</body>
</html>
