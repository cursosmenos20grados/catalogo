<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital | Parrilla Los Hermanos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --max-width: 500px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: var(--max-width);
            min-height: 100vh;
            background: var(--bg);
            position: relative;
        }

        /* Pantalla de Bienvenida */
        #welcome {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .select-mesa {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            margin: 20px 0;
            outline: none;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* App Principal */
        #app { 
            display: none; 
            padding-top: 140px; 
            padding-bottom: 100px; 
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: var(--max-width);
            background: #111827;
            z-index: 500;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .nav-categories {
            position: fixed;
            top: 75px;
            width: 100%;
            max-width: var(--max-width);
            background: var(--bg);
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 400;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-categories::-webkit-scrollbar { display: none; }

        .cat-tab {
            background: #334155;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: white;
            border: none;
            cursor: pointer;
        }
        .cat-tab.active { background: var(--primary); }

        .section-title {
            padding: 20px 15px 10px;
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 800;
        }

        /* Tarjeta de Producto */
        .product-card {
            background: var(--card);
            margin: 15px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0f172a;
        }

        .product-body {
            padding: 15px;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .product-price {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            min-height: 1.2em;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add.selected {
            background: #15803d;
        }

        /* Barra de Pedido Flotante */
        .order-bar-container {
            position: fixed;
            bottom: 20px;
            width: 100%;
            max-width: var(--max-width);
            padding: 0 15px;
            pointer-events: none;
            z-index: 1000;
        }

        .order-bar {
            background: var(--primary);
            color: white;
            padding: 16px 20px;
            border-radius: 18px;
            display: none;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Pantalla de Bienvenida -->
        <div id="welcome">
            <div class="welcome-card">
                <h1 style="margin:0; font-size: 1.8rem;">🔥 Los Hermanos</h1>
                <p style="color: var(--text-muted); margin: 10px 0;">Menú Digital</p>
                
                <select id="ubicacion" class="select-mesa">
                    <option value="" disabled selected>Selecciona tu mesa...</option>
                    <optgroup label="SALÓN">
                        <option value="Salón - Mesa 1">Mesa 1</option>
                        <option value="Salón - Mesa 7">Mesa 7</option>
                    </optgroup>
                    <optgroup label="CALLE">
                        <option value="Calle - Mesa 3">Mesa 3</option>
                    </optgroup>
                </select>
                
                <button class="btn-start" onclick="iniciarMenu()">VER LA CARTA</button>
            </div>
        </div>

        <!-- App Principal -->
        <div id="app">
            <header>
                <div id="display-mesa" style="font-weight:bold; color:var(--primary); font-size: 1.1rem; text-transform: uppercase;"></div>
            </header>

            <div id="nav-cats" class="nav-categories"></div>
            
            <div id="menu-list"></div>
            
            <div class="order-bar-container">
                <div id="order-bar" class="order-bar" onclick="enviarWhatsApp()">
                    <div class="order-info">
                        <span id="cart-count">0 items</span> • <span id="cart-total">$0</span>
                    </div>
                    <div style="font-weight: bold; display: flex; align-items: center; gap: 8px;">
                        PEDIR <i class="fab fa-whatsapp"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv";
    
    let menuData = [];
    let cart = [];
    let whatsappDefault = "5491168160001"; // Fallback por si no hay en el Excel

    function csvToJSON(csv) {
        const lines = csv.split("\n");
        const result = [];
        const headers = lines[0].split(",").map(h => h.trim());

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const obj = {};
            const currentline = lines[i].split(",");
            headers.forEach((header, sIdx) => {
                obj[header] = currentline[sIdx] ? currentline[sIdx].trim() : "";
            });
            result.push(obj);
        }
        return result;
    }

    async function cargarDatos() {
        try {
            const response = await fetch(`${SHEET_CSV_URL}&v=${Date.now()}`);
            const csvText = await response.text();
            menuData = csvToJSON(csvText);
            
            // Intentar tomar el WhatsApp de la primera fila si existe la columna "WhatsApp"
            if (menuData.length > 0 && menuData[0].WhatsApp) {
                whatsappDefault = menuData[0].WhatsApp.replace(/\D/g, ''); // Limpiar caracteres no numéricos
                console.log("WhatsApp cargado desde Excel:", whatsappDefault);
            }
        } catch (error) {
            console.error("Error cargando datos:", error);
        }
    }

    window.onload = cargarDatos;

    function iniciarMenu() {
        const mesa = document.getElementById('ubicacion').value;
        if(!mesa) return;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('display-mesa').innerText = "📍 " + mesa;
        renderizarMenu();
    }

    function renderizarMenu() {
        const container = document.getElementById('menu-list');
        const nav = document.getElementById('nav-cats');
        container.innerHTML = ""; nav.innerHTML = "";

        const items = menuData.filter(p => p.Disponible && p.Disponible.toUpperCase() === "SI");
        const categorias = [...new Set(items.map(p => p.Categoria))];
        
        categorias.forEach((cat, idx) => {
            const btn = document.createElement('button');
            btn.className = `cat-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                const element = document.getElementById("sec-" + cat);
                window.scrollTo({ top: element.offsetTop - 130, behavior: 'smooth' });
            };
            nav.appendChild(btn);

            const title = document.createElement('div');
            title.className = "section-title";
            title.id = "sec-" + cat;
            title.innerText = cat;
            container.appendChild(title);

            items.filter(p => p.Categoria === cat).forEach(prod => {
                const card = document.createElement('div');
                card.className = "product-card";
                const urlImagen = prod.ImagenURL || 'https://via.placeholder.com/500x300?text=Parrilla';

                card.innerHTML = `
                    <img src="${urlImagen}" class="product-img" onerror="this.src='https://via.placeholder.com/500x300?text=${prod.Producto}'">
                    <div class="product-body">
                        <div class="product-header">
                            <span class="product-name">${prod.Producto}</span>
                            <span class="product-price">$${Number(prod.Precio).toLocaleString('es-AR')}</span>
                        </div>
                        <p class="product-desc">${prod.Descripcion || 'Sin descripción disponible'}</p>
                        <button class="btn-add" id="btn-${prod.ID}" onclick="toggleCarrito('${prod.ID}')">
                            <i class="fas fa-plus"></i> AGREGAR
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function toggleCarrito(id) {
        const prod = menuData.find(p => p.ID === id);
        const index = cart.findIndex(i => i.ID === id);
        const btn = document.getElementById('btn-'+id);

        if(index > -1) {
            cart.splice(index, 1);
            btn.classList.remove('selected');
            btn.innerHTML = '<i class="fas fa-plus"></i> AGREGAR';
        } else {
            cart.push(prod);
            btn.classList.add('selected');
            btn.innerHTML = '<i class="fas fa-check"></i> AGREGADO';
        }
        actualizarBarra();
    }

    function actualizarBarra() {
        const bar = document.getElementById('order-bar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            const total = cart.reduce((s, i) => s + Number(i.Precio), 0);
            document.getElementById('cart-count').innerText = `${cart.length} productos`;
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-AR')}`;
        } else {
            bar.style.display = 'none';
        }
    }

    function enviarWhatsApp() {
        const mesa = document.getElementById('ubicacion').value;
        const total = cart.reduce((s, i) => s + Number(i.Precio), 0);
        
        let msj = `*NUEVO PEDIDO - ${mesa.toUpperCase()}*\n`;
        msj += `------------------------------\n`;
        cart.forEach(item => {
            msj += `• ${item.Producto} ($${item.Precio})\n`;
        });
        msj += `------------------------------\n`;
        msj += `*TOTAL: $${total.toLocaleString('es-AR')}*`;
        
        // El número ahora se toma de la variable cargada desde el Excel
        window.open(`https://wa.me/${whatsappDefault}?text=${encodeURIComponent(msj)}`, '_blank');
    }
</script>
</body>
</html>
