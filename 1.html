<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital | Parrilla Los Hermanos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida */
        #welcome {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 1)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .select-mesa {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            margin: 20px 0;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        /* Estilo para los grupos dentro del select */
        optgroup {
            background: #1e293b;
            color: var(--primary);
            font-weight: bold;
            font-style: normal;
        }
        option {
            background: #0f172a;
            color: white;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-start:active { transform: scale(0.95); }

        /* App Principal */
        #app { display: none; padding-top: 135px; padding-bottom: 100px; }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--card);
            z-index: 500;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .nav-categories {
            position: fixed;
            top: 65px; left: 0; right: 0;
            background: var(--bg);
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 400;
            border-bottom: 1px solid #1e293b;
        }
        .nav-categories::-webkit-scrollbar { display: none; }

        .cat-tab {
            background: var(--card);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid #334155;
            transition: 0.3s;
        }
        .cat-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .section-title {
            padding: 25px 15px 10px;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .product-card {
            background: var(--card);
            margin: 0 12px 12px;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .product-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            background: #0f172a;
            flex-shrink: 0;
        }

        .product-info { flex: 1; min-width: 0; }
        .product-name { font-weight: bold; font-size: 0.95rem; color: var(--text); }
        .product-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .product-price { color: var(--primary); font-weight: 800; font-size: 1rem; }

        .btn-add-circle {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: #334155;
            color: white;
            border: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-add-circle.selected { background: var(--primary); }

        .order-bar {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background: var(--primary);
            color: white;
            padding: 16px 20px;
            border-radius: 18px;
            display: none;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <div class="welcome-card">
            <h1 style="margin:0; font-size: 1.6rem;">🔥 Parrilla Hermanos</h1>
            <p style="color: var(--text-muted); margin: 8px 0 20px; font-size: 0.9rem;">Bienvenido, selecciona tu ubicación:</p>
            
            <select id="ubicacion" class="select-mesa">
                <option value="" disabled selected>-- SELECCIONA TU LUGAR --</option>
                <optgroup label="SALÓN PRINCIPAL">
                    <option value="Salón - Mesa 1">Mesa 1 (Salón)</option>
                    <option value="Salón - Mesa 2">Mesa 2 (Salón)</option>
                    <option value="Salón - Mesa 3">Mesa 3 (Salón)</option>
                    <option value="Salón - Mesa 4">Mesa 4 (Salón)</option>
                    <option value="Salón - Mesa 5">Mesa 5 (Salón)</option>
                    <option value="Salón - Mesa 6">Mesa 6 (Salón)</option>
                    <option value="Salón - Mesa 7">Mesa 7 (Salón)</option>
                    <option value="Salón - Mesa 8">Mesa 8 (Salón)</option>
                    <option value="Salón - Mesa 9">Mesa 9 (Salón)</option>
                </optgroup>
                <optgroup label="MESAS A LA CALLE">
                    <option value="Calle - Mesa 1">Mesa 1 (Calle)</option>
                    <option value="Calle - Mesa 2">Mesa 2 (Calle)</option>
                    <option value="Calle - Mesa 3">Mesa 3 (Calle)</option>
                    <option value="Calle - Mesa 4">Mesa 4 (Calle)</option>
                    <option value="Calle - Mesa 5">Mesa 5 (Calle)</option>
                    <option value="Calle - Mesa 6">Mesa 6 (Calle)</option>
                    <option value="Calle - Mesa 7">Mesa 7 (Calle)</option>
                    <option value="Calle - Mesa 8">Mesa 8 (Calle)</option>
                    <option value="Calle - Mesa 9">Mesa 9 (Calle)</option>
                    <option value="Calle - Mesa 10">Mesa 10 (Calle)</option>
                </optgroup>
                <optgroup label="OTROS">
                    <option value="Barra">🍸 Barra</option>
                    <option value="Moto Delivery">🛵 Moto Delivery</option>
                </optgroup>
            </select>
            
            <button class="btn-start" onclick="iniciarMenu()">VER LA CARTA</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div id="display-mesa" style="font-weight:bold; color:var(--primary); font-size: 1.1rem;"></div>
        </header>
        <div id="nav-cats" class="nav-categories"></div>
        <div id="menu-list"></div>
        <div id="order-bar" class="order-bar" onclick="enviarWhatsApp()">
            <div class="order-info">
                <span id="cart-count">0 productos</span>
                <span id="cart-total">$0</span>
            </div>
            <div style="background: rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                PEDIR <i class="fab fa-whatsapp" style="font-size:1.4rem;"></i>
            </div>
        </div>
    </div>

<script>
    let menuData = [];
    let cart = [];

    function iniciarMenu() {
        const mesa = document.getElementById('ubicacion').value;
        if(!mesa) return;
        menuData = JSON.parse(localStorage.getItem('menu_hermanos')) || [];
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('display-mesa').innerText = "📍 " + mesa;
        renderizarTodo();
    }

    function renderizarTodo() {
        const container = document.getElementById('menu-list');
        const nav = document.getElementById('nav-cats');
        container.innerHTML = ""; nav.innerHTML = "";

        const disponibles = menuData.filter(p => String(p.disponible || "").toUpperCase() !== "NO");
        if(disponibles.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:80px 20px; color:var(--text-muted);'>Cargando productos...</div>";
            return;
        }

        const categorias = [...new Set(disponibles.map(p => p.categoria || "Varios"))];
        categorias.forEach((cat, idx) => {
            const btn = document.createElement('div');
            btn.className = `cat-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                const el = document.getElementById('cat-sec-'+cat);
                window.scrollTo({ top: el.offsetTop - 130, behavior: "smooth" });
            };
            nav.appendChild(btn);

            const title = document.createElement('div');
            title.className = "section-title"; title.id = "cat-sec-" + cat; title.innerText = cat;
            container.appendChild(title);

            disponibles.filter(p => (p.categoria || "Varios") === cat).forEach(prod => {
                const card = document.createElement('div');
                card.className = "product-card";
                card.onclick = () => toggleProducto(prod, card);
                const imgHtml = prod.imagen 
                    ? `<img src="${prod.imagen}" class="product-img" onerror="this.src='https://via.placeholder.com/80?text=Comida'">`
                    : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;background:#1e293b;color:#475569"><i class="fas fa-utensils"></i></div>`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="product-info">
                        <span class="product-name">${prod.nombre}</span>
                        <p class="product-desc">${prod.descripcion || 'Especialidad de la casa'}</p>
                        <span class="product-price">$${Number(prod.precio).toLocaleString('es-AR')}</span>
                    </div>
                    <button class="btn-add-circle"><i class="fas fa-plus"></i></button>
                `;
                container.appendChild(card);
            });
        });
    }

    function toggleProducto(prod, cardEl) {
        const btn = cardEl.querySelector('.btn-add-circle');
        const index = cart.findIndex(i => i.nombre === prod.nombre);
        if(index > -1) {
            cart.splice(index, 1);
            btn.classList.remove('selected');
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        } else {
            cart.push(prod);
            btn.classList.add('selected');
            btn.innerHTML = '<i class="fas fa-check"></i>';
        }
        actualizarBarra();
    }

    function actualizarBarra() {
        const bar = document.getElementById('order-bar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            const total = cart.reduce((s, i) => s + Number(i.precio), 0);
            document.getElementById('cart-count').innerText = `${cart.length} prod.`;
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-AR')}`;
        } else { bar.style.display = 'none'; }
    }

    function enviarWhatsApp() {
        const ws = localStorage.getItem('ws_hermanos') || "";
        const mesa = document.getElementById('ubicacion').value;
        const total = cart.reduce((s, i) => s + Number(i.precio), 0);
        let mensaje = `*NUEVO PEDIDO - ${mesa}*\n----------\n`;
        cart.forEach(item => mensaje += `✅ ${item.nombre} - $${Number(item.precio).toLocaleString('es-AR')}\n`);
        mensaje += `----------\n*TOTAL: $${total.toLocaleString('es-AR')}*`;
        window.open(`https://wa.me/${ws}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>
</body>
</html>
