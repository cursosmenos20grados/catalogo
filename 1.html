<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Parrilla LOS HERMANOS</title>
    
    <!-- Meta Tags para Redes Sociales -->
    <meta property="og:title" content="🍽️ Nuestro Menú Online">
    <meta property="og:description" content="Elegí tus platos favoritos y pedí por WhatsApp.">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 100px;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pantalla de Bienvenida */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .ai-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.2);
            object-fit: cover;
        }

        .welcome-title { margin: 10px 0; font-size: 1.8rem; }
        .welcome-sub { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }

        .selector-mesa {
            padding: 15px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-ingresar {
            padding: 16px 60px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }

        .btn-ingresar:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Contenedor Principal App */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            display: none; /* Se activa al ingresar */
        }

        /* Navegación Sticky */
        .category-nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 15px;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            white-space: nowrap;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-btn:active { background: var(--primary); }

        /* Lista de Productos */
        .section-title {
            padding: 30px 20px 10px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .producto-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin: 0 15px 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .producto-card.selected {
            border-color: var(--primary);
            background: rgba(46, 204, 113, 0.1);
            transform: scale(1.01);
        }

        .checkbox-custom {
            width: 24px; height: 24px;
            border: 2px solid #475569;
            border-radius: 50%;
            margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .selected .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }
        .selected .checkbox-custom::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .producto-img {
            width: 80px; height: 80px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 15px;
            background: #1e293b;
        }

        .info { flex-grow: 1; }
        .info strong { display: block; font-size: 1.05rem; margin-bottom: 2px; }
        .info small { color: var(--text-muted); display: block; font-size: 0.8rem; margin-bottom: 6px; line-height: 1.2; }
        .precio { color: var(--primary); font-weight: 700; font-size: 1.1rem; }

        /* Botón Flotante WhatsApp */
        .btn-pedido {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: bold;
            width: 92%;
            max-width: 450px;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-pedido:active { transform: translateX(-50%) scale(0.96); }

        .badge-cart {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE BIENVENIDA -->
    <div id="welcome-screen">
        <img src="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true" class="ai-avatar" alt="Logo">
        <h1 class="welcome-title">Parrilla "LOS HERMANOS"</h1>
        <p class="welcome-sub">📍 Por favor, dinos dónde te encuentras:</p>
        
        <select id="mesa-selector" class="selector-mesa">
            <option value="">-- Seleccionar Ubicación --</option>
            <optgroup label="SALÓN">
                <option value="Mesa 1">Mesa 01</option>
                <option value="Mesa 2">Mesa 02</option>
                <option value="Mesa 3">Mesa 03</option>
                <option value="Mesa 4">Mesa 04</option>
                <option value="Mesa 5">Mesa 05</option>
                <option value="Barra">Barra</option>
            </optgroup>
            <optgroup label="OTROS">
                <option value="Vereda">Vereda</option>
                <option value="Para llevar">🛍️ Para llevar</option>
                <option value="Delivery">🛵 Delivery</option>
            </optgroup>
        </select>
        
        <button id="btn-entrar" onclick="iniciarApp()" class="btn-ingresar" disabled>
            CARGANDO MENÚ...
        </button>
    </div>

    <!-- CONTENEDOR DE LA APP -->
    <div id="app" class="app-container">
        <nav id="nav-categorias" class="category-nav"></nav>
        
        <div id="lista-menu"></div>

        <button class="btn-pedido" onclick="enviarPedido()">
            <span>ENVIAR PEDIDO</span>
            <div class="badge-cart">
                <span id="cart-count">0</span> ítems | <span id="cart-total">$0</span>
            </div>
        </button>
    </div>

<script>
    // Configuración
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv';
    
    // Estado Global
    let menuData = [];
    let carrito = [];
    let mesaSeleccionada = "";
    let dataReady = false; // Corregido: eliminado el espacio que causaba SyntaxError

    // 1. CARGA INMEDIATA AL ABRIR
    window.addEventListener('DOMContentLoaded', cargarMenu);

    async function cargarMenu() {
        try {
            const response = await fetch(CSV_URL);
            const textData = await response.text();
            
            // Procesamos el CSV saltando la cabecera
            const filas = textData.split(/\r?\n/).slice(1);
            
            menuData = filas.map(fila => {
                const cols = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                return {
                    categoria: cols[1]?.replace(/"/g, "").trim().toUpperCase() || "OTROS",
                    nombre: cols[2]?.replace(/"/g, "").trim() || "",
                    descripcion: cols[3]?.replace(/"/g, "").trim() || "",
                    precio: parsearMoneda(cols[4]),
                    imagen: cols[5]?.trim() || "",
                    disponible: cols[6]?.trim().toUpperCase() === "SI",
                    whatsapp: cols[10]?.trim() || "5491100000000"
                };
            }).filter(item => item.nombre && item.disponible);

            prepararInterfaz();
            
            // Habilitamos el botón de entrada
            const btn = document.getElementById('btn-entrar');
            btn.innerText = "INGRESAR AL MENÚ";
            btn.disabled = false;
            dataReady = true;

        } catch (error) {
            console.error("Error crítico:", error);
            const btn = document.getElementById('btn-entrar');
            btn.innerText = "ERROR AL CARGAR";
            btn.style.background = "#e74c3c";
        }
    }

    // Función para limpiar precios
    function parsearMoneda(valor) {
        if (!valor) return 0;
        let limpio = valor.replace(/[^\d]/g, ""); 
        return parseFloat(limpio) || 0;
    }

    function prepararInterfaz() {
        const contMenu = document.getElementById('lista-menu');
        const contNav = document.getElementById('nav-categorias');
        
        contMenu.innerHTML = "";
        contNav.innerHTML = "";

        const categorias = [...new Set(menuData.map(m => m.categoria))];

        categorias.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat;
            btn.onclick = () => {
                document.getElementById(`sec-${cat}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
            };
            contNav.appendChild(btn);

            const titulo = document.createElement('div');
            titulo.id = `sec-${cat}`;
            titulo.className = 'section-title';
            titulo.innerText = cat;
            contMenu.appendChild(titulo);

            menuData.filter(m => m.categoria === cat).forEach((prod, i) => {
                const cardId = `prod-${cat}-${i}`;
                const card = document.createElement('div');
                card.className = 'producto-card';
                card.id = cardId;
                card.innerHTML = `
                    <div class="checkbox-custom"></div>
                    <img src="${prod.imagen}" class="producto-img" onerror="this.src='https://via.placeholder.com/150?text=Comida'">
                    <div class="info">
                        <strong>${prod.nombre}</strong>
                        <small>${prod.descripcion}</small>
                        <span class="precio">$${prod.precio.toLocaleString('es-AR')}</span>
                    </div>
                `;
                card.onclick = () => toggleProducto(prod, cardId);
                contMenu.appendChild(card);
            });
        });
    }

    function toggleProducto(producto, elementId) {
        const el = document.getElementById(elementId);
        const index = carrito.findIndex(item => item.nombre === producto.nombre);

        if (index > -1) {
            carrito.splice(index, 1);
            el.classList.remove('selected');
        } else {
            carrito.push(producto);
            el.classList.add('selected');
        }
        
        actualizarUI();
    }

    function actualizarUI() {
        const total = carrito.reduce((acc, curr) => acc + curr.precio, 0);
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-AR')}`;
    }

    function iniciarApp() {
        if (!dataReady) return;
        
        mesaSeleccionada = document.getElementById('mesa-selector').value;
        if (!mesaSeleccionada) {
            alert("Por favor, selecciona tu mesa o ubicación.");
            return;
        }
        
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        window.scrollTo(0,0);
    }

    function enviarPedido() {
        if (carrito.length === 0) {
            alert("Tu carrito está vacío. ¡Elige algo rico!");
            return;
        }

        const numeroWhatsApp = menuData[0]?.whatsapp || "5491100000000";
        let emoji = mesaSeleccionada.match(/Delivery|llevar/i) ? "🛵" : "🍽️";
        
        let texto = `*NUEVO PEDIDO ${emoji}*\n`;
        texto += `*UBICACIÓN:* ${mesaSeleccionada}\n`;
        texto += `------------------------------\n`;
        
        carrito.forEach(item => {
            texto += `• ${item.nombre} ($${item.precio.toLocaleString('es-AR')})\n`;
        });

        const totalFinal = carrito.reduce((acc, curr) => acc + curr.precio, 0);
        texto += `------------------------------\n`;
        texto += `*TOTAL: $${totalFinal.toLocaleString('es-AR')}*`;

        const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(texto)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
