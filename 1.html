<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital | Parrilla Los Hermanos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }

        /* Pantalla de Bienvenida */
        #welcome {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 1)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .select-mesa {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            margin: 20px 0;
            outline: none;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* App Principal */
        #app { display: none; padding-top: 130px; }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--card);
            z-index: 500;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .nav-categories {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: var(--bg);
            display: flex;
            gap: 10px;
            padding: 12px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 400;
            border-bottom: 1px solid #1e293b;
        }
        .nav-categories::-webkit-scrollbar { display: none; }

        .cat-tab {
            background: var(--card);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid #334155;
        }
        .cat-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Lista de Productos */
        .section-title {
            padding: 20px 15px 10px;
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: bold;
        }

        .product-card {
            background: var(--card);
            margin: 0 12px 12px;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.1s;
        }

        .product-card:active { transform: scale(0.98); }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #0f172a;
            flex-shrink: 0;
        }

        .product-info { flex: 1; min-width: 0; }
        .product-name { 
            display: block; 
            font-weight: bold; 
            font-size: 1rem; 
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-desc { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .product-price { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 1.05rem; 
        }

        .btn-add-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #334155;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .btn-add-circle.selected {
            background: var(--primary);
        }

        /* Barra de Pedido Final (WhatsApp) */
        .order-bar {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 16px;
            display: none;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 1000;
            font-weight: bold;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .order-info { display: flex; flex-direction: column; }
        .order-info span:first-child { font-size: 0.8rem; opacity: 0.9; }
        .order-info span:last-child { font-size: 1.1rem; }

        .btn-send {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <div class="welcome-card">
            <h1 style="margin:0; font-size: 1.5rem;">🔥 Parrilla Hermanos</h1>
            <p style="color: var(--text-muted); margin: 10px 0 20px;">Menú Digital v2.0</p>
            
            <select id="mesa-select" class="select-mesa">
                <option value="" disabled selected>¿En qué mesa estás?</option>
                <option value="SALÓN - Mesa 1">Mesa 1</option>
                <option value="SALÓN - Mesa 2">Mesa 2</option>
                <option value="CALLE - Mesa 3">Mesa 3 (Calle)</option>
                <option value="CALLE - Mesa 4">Mesa 4 (Calle)</option>
                <option value="BARRA">Barra</option>
                <option value="DELIVERY">🛵 Delivery / Retiro</option>
            </select>
            
            <button class="btn-start" onclick="iniciarMenu()">VER LA CARTA</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div id="display-mesa" style="font-weight:bold; color:var(--primary);"></div>
        </header>

        <div id="nav-cats" class="nav-categories"></div>
        <div id="menu-list"></div>

        <div id="order-bar" class="order-bar" onclick="enviarWhatsApp()">
            <div class="order-info">
                <span id="cart-count">0 productos</span>
                <span id="cart-total">$0</span>
            </div>
            <div class="btn-send">
                PEDIR <i class="fab fa-whatsapp" style="font-size:1.3rem;"></i>
            </div>
        </div>
    </div>

<script>
    let menuData = [];
    let cart = [];

    function iniciarMenu() {
        const mesa = document.getElementById('mesa-select').value;
        if(!mesa) return alert("Por favor selecciona tu mesa o ubicación");

        // Cargar datos de LocalStorage (del Admin)
        menuData = JSON.parse(localStorage.getItem('menu_hermanos')) || [];
        
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('display-mesa').innerText = "📍 " + mesa;
        
        renderizarTodo();
    }

    function renderizarTodo() {
        const container = document.getElementById('menu-list');
        const nav = document.getElementById('nav-cats');
        container.innerHTML = "";
        nav.innerHTML = "";

        // Solo productos que no tengan "NO" en disponibilidad
        const disponibles = menuData.filter(p => {
            const disp = String(p.disponible || "").toUpperCase();
            return disp !== "NO";
        });

        if(disponibles.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:50px; color:var(--text-muted);'>Cargando productos...</p>";
            return;
        }

        const categorias = [...new Set(disponibles.map(p => p.categoria || "Varios"))];

        categorias.forEach((cat, idx) => {
            // Botón Nav
            const btn = document.createElement('div');
            btn.className = `cat-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('cat-sec-'+cat).scrollIntoView({behavior:'smooth', block:'center'});
            };
            nav.appendChild(btn);

            // Título Sección
            const title = document.createElement('div');
            title.className = "section-title";
            title.id = "cat-sec-" + cat;
            title.innerText = cat;
            container.appendChild(title);

            // Lista de productos de esa categoría
            disponibles.filter(p => (p.categoria || "Varios") === cat).forEach(prod => {
                const card = document.createElement('div');
                card.className = "product-card";
                card.onclick = () => toggleProducto(prod, card);
                
                // Imagen pequeña o Icono si no hay imagen
                const imgHtml = prod.imagen 
                    ? `<img src="${prod.imagen}" class="product-img" onerror="this.src='https://via.placeholder.com/80?text=Comida'">`
                    : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;background:#1e293b;color:#334155"><i class="fas fa-utensils"></i></div>`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="product-info">
                        <span class="product-name">${prod.nombre}</span>
                        <p class="product-desc">${prod.descripcion || 'Sin descripción'}</p>
                        <span class="product-price">$${Number(prod.precio).toLocaleString('es-AR')}</span>
                    </div>
                    <button class="btn-add-circle">
                        <i class="fas fa-plus"></i>
                    </button>
                `;
                container.appendChild(card);
            });
        });
    }

    function toggleProducto(prod, cardEl) {
        const btn = cardEl.querySelector('.btn-add-circle');
        const index = cart.findIndex(i => i.nombre === prod.nombre);

        if(index > -1) {
            cart.splice(index, 1);
            btn.classList.remove('selected');
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        } else {
            cart.push(prod);
            btn.classList.add('selected');
            btn.innerHTML = '<i class="fas fa-check"></i>';
        }
        actualizarBarra();
    }

    function actualizarBarra() {
        const bar = document.getElementById('order-bar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            const total = cart.reduce((s, i) => s + Number(i.precio), 0);
            document.getElementById('cart-count').innerText = `${cart.length} ${cart.length === 1 ? 'producto' : 'productos'}`;
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-AR')}`;
        } else {
            bar.style.display = 'none';
        }
    }

    function enviarWhatsApp() {
        const ws = localStorage.getItem('ws_hermanos') || "";
        const mesa = document.getElementById('mesa-select').value;
        const total = cart.reduce((s, i) => s + Number(i.precio), 0);

        let mensaje = `*NUEVO PEDIDO - ${mesa}*\n`;
        mensaje += `----------------------------\n`;
        cart.forEach(item => {
            mensaje += `✅ ${item.nombre} - $${Number(item.precio).toLocaleString('es-AR')}\n`;
        });
        mensaje += `----------------------------\n`;
        mensaje += `*TOTAL A PAGAR: $${total.toLocaleString('es-AR')}*`;

        const url = `https://wa.me/${ws}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
