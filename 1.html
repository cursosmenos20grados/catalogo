<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital | Parrilla Los Hermanos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Pantalla de Bienvenida con fondo más nítido */
        #welcome {
            position: fixed;
            inset: 0;
            /* Se utiliza una imagen de alta resolución y un degradado más sutil para mayor nitidez */
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .select-mesa {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid var(--primary);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            margin: 20px 0;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        optgroup { background: #1e293b; color: var(--primary); font-weight: bold; }
        option { background: #0f172a; color: white; }

        .btn-start {
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-start:disabled { background: #475569; cursor: not-allowed; }

        /* App Principal */
        #app { display: none; padding-top: 135px; padding-bottom: 100px; }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--card);
            z-index: 500;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .nav-categories {
            position: fixed;
            top: 65px; left: 0; right: 0;
            background: var(--bg);
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            z-index: 400;
            border-bottom: 1px solid #1e293b;
        }

        .cat-tab {
            background: var(--card);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid #334155;
        }
        .cat-tab.active { background: var(--primary); color: white; }

        .section-title {
            padding: 25px 15px 10px;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .product-card {
            background: var(--card);
            margin: 0 12px 12px;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .product-img {
            width: 70px; height: 70px;
            border-radius: 12px;
            object-fit: cover;
            background: #0f172a;
        }

        .product-info { flex: 1; }
        .product-name { font-weight: bold; font-size: 0.95rem; }
        .product-desc { font-size: 0.8rem; color: var(--text-muted); }
        .product-price { color: var(--primary); font-weight: 800; }

        .btn-add-circle {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: #334155;
            color: white;
            border: none;
        }
        .btn-add-circle.selected { background: var(--primary); }

        .order-bar {
            position: fixed;
            bottom: 20px; left: 15px; right: 15px;
            background: var(--primary);
            color: white;
            padding: 16px 20px;
            border-radius: 18px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <div class="welcome-card">
            <h1 style="margin:0; font-size: 1.6rem;">🔥 Parrilla Hermanos</h1>
            <p style="color: var(--text-muted); margin: 8px 0 20px; font-size: 0.9rem;">Bienvenido, selecciona tu ubicación:</p>
            
            <select id="ubicacion" class="select-mesa">
                <option value="" disabled selected>-- SELECCIONA TU LUGAR --</option>
                <optgroup label="SALÓN PRINCIPAL">
                    <option value="Salón - Mesa 1">Mesa 1 (Salón)</option>
                    <option value="Salón - Mesa 2">Mesa 2 (Salón)</option>
                    <option value="Salón - Mesa 3">Mesa 3 (Salón)</option>
                    <option value="Salón - Mesa 4">Mesa 4 (Salón)</option>
                    <option value="Salón - Mesa 5">Mesa 5 (Salón)</option>
                    <option value="Salón - Mesa 6">Mesa 6 (Salón)</option>
                    <option value="Salón - Mesa 7">Mesa 7 (Salón)</option>
                    <option value="Salón - Mesa 8">Mesa 8 (Salón)</option>
                    <option value="Salón - Mesa 9">Mesa 9 (Salón)</option>
                </optgroup>
                <optgroup label="MESAS A LA CALLE">
                    <option value="Calle - Mesa 1">Mesa 1 (Calle)</option>
                    <option value="Calle - Mesa 2">Mesa 2 (Calle)</option>
                    <option value="Calle - Mesa 3">Mesa 3 (Calle)</option>
                    <option value="Calle - Mesa 4">Mesa 4 (Calle)</option>
                    <option value="Calle - Mesa 5">Mesa 5 (Calle)</option>
                    <option value="Calle - Mesa 6">Mesa 6 (Calle)</option>
                    <option value="Calle - Mesa 7">Mesa 7 (Calle)</option>
                    <option value="Calle - Mesa 8">Mesa 8 (Calle)</option>
                    <option value="Calle - Mesa 9">Mesa 9 (Calle)</option>
                    <option value="Calle - Mesa 10">Mesa 10 (Calle)</option>
                </optgroup>
                <optgroup label="OTROS">
                    <option value="Barra">🍸 Barra</option>
                    <option value="Moto Delivery">🛵 Moto Delivery</option>
                </optgroup>
            </select>
            
            <button class="btn-start" id="btn-entrar" onclick="iniciarMenu()">VER LA CARTA</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div id="display-mesa" style="font-weight:bold; color:var(--primary); font-size: 1.1rem;"></div>
        </header>
        <div id="nav-cats" class="nav-categories"></div>
        <div id="menu-list"></div>
        <div id="order-bar" class="order-bar" onclick="enviarWhatsApp()">
            <div class="order-info">
                <span id="cart-count">0 productos</span>
                <span id="cart-total">$0</span>
            </div>
            <div style="background: rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                PEDIR <i class="fab fa-whatsapp" style="font-size:1.4rem;"></i>
            </div>
        </div>
    </div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv";
    
    let menuData = [];
    let cart = [];

    function csvToJSON(csv) {
        const lines = csv.split("\n");
        const result = [];
        const headers = lines[0].split(",").map(h => h.trim().toLowerCase());

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const obj = {};
            const currentline = lines[i].split(",");

            headers.forEach((header, sIdx) => {
                obj[header] = currentline[sIdx] ? currentline[sIdx].trim() : "";
            });
            result.push(obj);
        }
        return result;
    }

    async function cargarDatosSheets() {
        const btn = document.getElementById('btn-entrar');
        btn.innerText = "ACTUALIZANDO CARTA...";
        btn.disabled = true;

        try {
            const response = await fetch(`${SHEET_CSV_URL}&v=${Date.now()}`);
            const csvText = await response.text();
            menuData = csvToJSON(csvText);
            
            btn.innerText = "VER LA CARTA";
            btn.disabled = false;
        } catch (error) {
            console.error("Error:", error);
            btn.innerText = "ERROR DE CONEXIÓN";
        }
    }

    window.onload = cargarDatosSheets;

    function iniciarMenu() {
        const mesa = document.getElementById('ubicacion').value;
        if(!mesa) return;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('display-mesa').innerText = "📍 " + mesa;
        renderizarTodo();
    }

    function renderizarTodo() {
        const container = document.getElementById('menu-list');
        const nav = document.getElementById('nav-cats');
        container.innerHTML = ""; nav.innerHTML = "";

        const disponibles = menuData.filter(p => p.disponible && p.disponible.toUpperCase() !== "NO");
        const categorias = [...new Set(disponibles.map(p => p.categoria || "VARIOS"))];
        
        categorias.forEach((cat, idx) => {
            const btn = document.createElement('div');
            btn.className = `cat-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('cat-sec-'+cat).scrollIntoView({behavior: "smooth", block: "start"});
            };
            nav.appendChild(btn);

            const title = document.createElement('div');
            title.className = "section-title"; title.id = "cat-sec-" + cat; title.innerText = cat;
            container.appendChild(title);

            disponibles.filter(p => p.categoria === cat).forEach(prod => {
                const card = document.createElement('div');
                card.className = "product-card";
                card.onclick = () => toggleProducto(prod, card);
                
                const imgHtml = prod.imagen && prod.imagen !== "" 
                    ? `<img src="${prod.imagen}" class="product-img" onerror="this.src='https://via.placeholder.com/80?text=Parrilla'">`
                    : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;background:#1e293b;"><i class="fas fa-fire"></i></div>`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="product-info">
                        <span class="product-name">${prod.nombre}</span>
                        <p class="product-desc">${prod.descripcion || ''}</p>
                        <span class="product-price">$${Number(prod.precio).toLocaleString('es-AR')}</span>
                    </div>
                    <button class="btn-add-circle"><i class="fas fa-plus"></i></button>
                `;
                container.appendChild(card);
            });
        });
    }

    function toggleProducto(prod, cardEl) {
        const btn = cardEl.querySelector('.btn-add-circle');
        const index = cart.findIndex(i => i.nombre === prod.nombre);
        if(index > -1) {
            cart.splice(index, 1);
            btn.classList.remove('selected');
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        } else {
            cart.push(prod);
            btn.classList.add('selected');
            btn.innerHTML = '<i class="fas fa-check"></i>';
        }
        actualizarBarra();
    }

    function actualizarBarra() {
        const bar = document.getElementById('order-bar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            const total = cart.reduce((s, i) => s + Number(i.precio), 0);
            document.getElementById('cart-count').innerText = `${cart.length} ítems`;
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-AR')}`;
        } else { bar.style.display = 'none'; }
    }

    function enviarWhatsApp() {
        const ws = localStorage.getItem('ws_hermanos') || "5491168160001"; 
        const mesa = document.getElementById('ubicacion').value;
        const total = cart.reduce((s, i) => s + Number(i.precio), 0);
        
        let mensaje = `*NUEVO PEDIDO - ${mesa.toUpperCase()}*\n----------\n`;
        cart.forEach(item => mensaje += `• ${item.nombre} ($${item.precio})\n`);
        mensaje += `----------\n*TOTAL: $${total.toLocaleString('es-AR')}*`;
        
        window.open(`https://wa.me/${ws}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>
</body>
</html>
