<!-- Versión ultra-simplificada para máxima facilidad de uso -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital | Parrilla Los Hermanos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2ecc71;
            --accent: #f1c40f;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 100px;
        }

        /* Estilo de Bienvenida */
        #welcome {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.98)), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        #welcome h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 1);
        }

        #welcome p {
            margin-bottom: 30px; 
            color: #ffffff; 
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 1);
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            color: white;
        }

        /* Selector único y grande para que sea fácil de tocar */
        .select-mesa {
            width: 100%;
            max-width: 340px;
            padding: 18px;
            background: #1e293b;
            border: 3px solid var(--primary);
            color: #ffffff !important;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            outline: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            padding: 20px 60px;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        /* App Layout */
        #app { display: none; }

        header {
            padding: 20px;
            background: var(--card);
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .cat-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 90;
            border-bottom: 1px solid #1e293b;
        }

        .cat-item {
            background: var(--card);
            padding: 10px 20px;
            border-radius: 30px;
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-muted);
            border: 1px solid #334155;
        }

        .cat-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .product-grid {
            display: grid;
            gap: 20px;
            padding: 15px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #334155;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .card-price { color: var(--primary); }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .card-footer {
            padding: 10px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add.selected {
            background: var(--danger);
        }

        /* Footer Pedido */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            background: var(--primary);
            padding: 15px;
            border-radius: 15px;
            display: none;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="welcome">
        <div class="welcome-logo"><i class="fas fa-utensils"></i></div>
        <h1>Parrilla Los Hermanos</h1>
        <p>Toca abajo para elegir tu mesa</p>
        
        <select id="ubicacion" class="select-mesa">
            <option value="" disabled selected>-- SELECCIONA TU LUGAR --</option>
            <optgroup label="SALÓN PRINCIPAL">
                <option value="Salón - Mesa 1">Mesa 1 (Salón)</option>
                <option value="Salón - Mesa 2">Mesa 2 (Salón)</option>
                <option value="Salón - Mesa 3">Mesa 3 (Salón)</option>
                <option value="Salón - Mesa 4">Mesa 4 (Salón)</option>
                <option value="Salón - Mesa 5">Mesa 5 (Salón)</option>
                <option value="Salón - Mesa 6">Mesa 6 (Salón)</option>
                <option value="Salón - Mesa 7">Mesa 7 (Salón)</option>
                <option value="Salón - Mesa 8">Mesa 8 (Salón)</option>
                <option value="Salón - Mesa 9">Mesa 9 (Salón)</option>
            </optgroup>
            <optgroup label="MESAS A LA CALLE">
                <option value="Calle - Mesa 1">Mesa 1 (Calle)</option>
                <option value="Calle - Mesa 2">Mesa 2 (Calle)</option>
                <option value="Calle - Mesa 3">Mesa 3 (Calle)</option>
                <option value="Calle - Mesa 4">Mesa 4 (Calle)</option>
                <option value="Calle - Mesa 5">Mesa 5 (Calle)</option>
                <option value="Calle - Mesa 6">Mesa 6 (Calle)</option>
                <option value="Calle - Mesa 7">Mesa 7 (Calle)</option>
                <option value="Calle - Mesa 8">Mesa 8 (Calle)</option>
                <option value="Calle - Mesa 9">Mesa 9 (Calle)</option>
                <option value="Calle - Mesa 10">Mesa 10 (Calle)</option>
            </optgroup>
            <optgroup label="OTROS">
                <option value="Barra">🍸 Barra</option>
                <option value="Moto Delivery">🛵 Moto Delivery</option>
            </optgroup>
        </select>
        
        <button class="btn-start" onclick="iniciar()">VER MENÚ</button>
    </div>

    <div id="app">
        <header>
            <h2 id="mesa-tag" style="margin:0; color: var(--primary);"></h2>
        </header>

        <div id="categories" class="cat-scroll"></div>
        <div id="menu-container"></div>

        <div id="cart-bar" class="cart-bar" onclick="enviarPedido()">
            <div>
                <span id="cart-count">0</span> productos
                <br>
                <span id="cart-total" style="font-size: 1.2rem;">$0</span>
            </div>
            <span>PEDIR POR WHATSAPP <i class="fab fa-whatsapp"></i></span>
        </div>
    </div>

<script>
    let menuItems = JSON.parse(localStorage.getItem('menu_hermanos')) || [];
    let wsNumber = localStorage.getItem('ws_hermanos') || "";
    let cart = [];

    function iniciar() {
        const ubi = document.getElementById('ubicacion').value;
        if(!ubi) {
            alert("Por favor, selecciona una mesa de la lista.");
            return;
        }
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('mesa-tag').innerText = "📍 " + ubi.toUpperCase();
        renderMenu();
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        const catsNav = document.getElementById('categories');
        container.innerHTML = "";
        catsNav.innerHTML = "";

        const disponibles = menuItems.filter(p => p.disponible);
        if(disponibles.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:50px;'>No hay productos cargados aún.</div>";
            return;
        }

        const categorias = [...new Set(disponibles.map(p => p.categoria))];

        categorias.forEach((cat, idx) => {
            const btn = document.createElement('div');
            btn.className = `cat-item ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('cat-' + cat).scrollIntoView({behavior: 'smooth', block: 'start'});
            };
            catsNav.appendChild(btn);

            const section = document.createElement('div');
            section.id = 'cat-' + cat;
            section.innerHTML = `<h2 style="padding: 20px 20px 0; color: var(--primary)">${cat}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'product-grid';

            disponibles.filter(p => p.categoria === cat).forEach((prod) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const img = prod.imagen ? `<img src="${prod.imagen}" class="card-img" onerror="this.style.display='none'">` : "";

                card.innerHTML = `
                    ${img}
                    <div class="card-body">
                        <div class="card-title">
                            <span>${prod.nombre}</span>
                            <span class="card-price">$${Number(prod.precio).toLocaleString('es-AR')}</span>
                        </div>
                        <p class="card-desc">${prod.descripcion || ''}</p>
                    </div>
                    <div class="card-footer">
                        <button class="btn-add" id="btn-${prod.nombre.replace(/\s/g, '')}" onclick="toggleCart('${prod.nombre}')">
                            <i class="fas fa-plus"></i> AGREGAR
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            container.appendChild(section);
        });
    }

    function toggleCart(nombre) {
        const prod = menuItems.find(p => p.nombre === nombre);
        const btn = document.getElementById('btn-' + nombre.replace(/\s/g, ''));
        const idx = cart.findIndex(item => item.nombre === nombre);

        if(idx > -1) {
            cart.splice(idx, 1);
            btn.classList.remove('selected');
            btn.innerHTML = '<i class="fas fa-plus"></i> AGREGAR';
        } else {
            cart.push(prod);
            btn.classList.add('selected');
            btn.innerHTML = '<i class="fas fa-check"></i> QUITAR';
        }
        actualizarUI();
    }

    function actualizarUI() {
        const bar = document.getElementById('cart-bar');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('cart-total');

        if(cart.length > 0) {
            bar.style.display = 'flex';
            const sum = cart.reduce((acc, p) => acc + Number(p.precio), 0);
            count.innerText = cart.length;
            total.innerText = "$" + sum.toLocaleString('es-AR');
        } else {
            bar.style.display = 'none';
        }
    }

    function enviarPedido() {
        if(cart.length === 0) return;
        const ubi = document.getElementById('ubicacion').value;
        let msj = `*NUEVO PEDIDO - ${ubi.toUpperCase()}*\n\n`;
        
        cart.forEach(p => {
            msj += `• ${p.nombre} ($${Number(p.precio).toLocaleString('es-AR')})\n`;
        });

        const total = cart.reduce((acc, p) => acc + Number(p.precio), 0);
        msj += `\n*TOTAL: $${total.toLocaleString('es-AR')}*`;

        window.open(`https://wa.me/${wsNumber}?text=${encodeURIComponent(msj)}`, '_blank');
    }
</script>
</body>
</html>
