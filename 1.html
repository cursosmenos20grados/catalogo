<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Menú Digital Inteligente por QR</title>
<meta name="description" content="Hacé tu pedido online en Restaurante a un clic de distancia.">

<meta property="og:type" content="website">
<meta property="og:title" content="🍽️ Menú Online">
<meta property="og:description" content="Elegí tus menú favorito y enviá tu pedido por WhatsApp de forma fácil y rápida.">
<meta property="og:url" content="https://cursosmenos20grados.github.io/catalogo/1.html">
<meta property="og:image" content="https://raw.githubusercontent.com/cursosmenos20grados/catalogo/main/moza_robot.jpg"
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catalogo">
<link rel="icon" href="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true">
<link rel="apple-touch-icon" href="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true">
   
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text);
            padding-bottom: 120px;
            scroll-behavior: smooth; /* SCROLL SUAVE ACTIVADO */
        }

        /* NAVEGACIÓN DE CATEGORÍAS */
        .category-nav {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px;
            position: sticky; top: 0; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px); z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 18px; border-radius: 20px;
            white-space: nowrap; font-size: 0.85em; cursor: pointer;
        }

        .section-title { 
            padding: 25px 15px 10px; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9em; font-weight: bold;
        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ai-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--primary); margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
        }

        .app-container { max-width: 500px; margin: 0 auto; display: none; }

        .producto-card {
            background: var(--card-bg); border-radius: 15px; margin: 0 15px 12px; padding: 12px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease; cursor: pointer;
        }

        .producto-card.selected {
            border-color: var(--primary);
            background: rgba(46, 204, 113, 0.15);
            transform: scale(1.02);
        }

        .checkbox-custom {
            width: 26px; height: 26px; border: 2px solid #64748b;
            border-radius: 50%; margin-right: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .selected .checkbox-custom { background: var(--primary); border-color: var(--primary); }
        .selected .checkbox-custom::after { content: '✓'; color: white; font-size: 16px; font-weight: bold; }

        .producto-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; margin-right: 15px; }

        .info { flex-grow: 1; }
        .info strong { display: block; font-size: 1.1em; }
        .info small { color: #94a3b8; display: block; font-size: 0.85em; margin: 4px 0; }
        .precio { color: var(--primary); font-weight: bold; font-size: 1.2em; }

        .btn-whatsapp {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            width: 90%; max-width: 420px; z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; justify-content: space-between; align-items: center;
        }

        .badge-info { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img src="https://github.com/cursosmenos20grados/catalogo/blob/main/moza_robot.jpg?raw=true" class="ai-avatar">
    <h2>Helados.mix</h2>
    <p style="color: #94a3b8; margin-bottom: 25px;">Seleccione su ubicación</p>
    
    <select id="mesa-selector" style="padding:14px; background:#1e293b; color:white; border:1px solid #444; width: 260px; border-radius: 12px; font-size: 1em;">
        <option value="">-- ¿Dónde se encuentra? --</option>
        <optgroup label="SALÓN PRINCIPAL">
            <option value="Mesa 1">Mesa 01</option>
            <option value="Mesa 2">Mesa 02</option>
            <option value="Mesa 3">Mesa 03</option>
            <option value="Mesa 4">Mesa 04</option>
            <option value="Mesa 5">Mesa 05</option>
            <option value="Barra">Barra Central</option>
        </optgroup>
        <optgroup label="EXTERIOR / ENVÍO">
            <option value="Vereda">Vereda</option>
             <option value="Mesa 1">Mesa 01</option>
            <option value="Mesa 2">Mesa 02</option>
            <option value="Mesa 3">Mesa 03</option>
            <option value="Mesa 4">Mesa 04</option>
            <option value="Mesa 5">Mesa 05</option>
            <option value="Para llevar">🛍️ Para llevar</option>
            <option value="Delivery">🛵 Moto Delivery</option>
        </optgroup>
    </select>
    
    <button onclick="iniciarApp()" style="padding:16px 50px; background:var(--primary); color:white; border:none; font-weight:bold; border-radius:12px; margin-top:15px; cursor:pointer;">INGRESAR AL MENÚ</button>
</div>

<div id="app" class="app-container">
    <div id="nav-categorias" class="category-nav"></div>
    <div id="lista-menu"></div>

    <button class="btn-whatsapp" onclick="enviarPedido()">
        <span>ENVIAR PEDIDO</span>
        <div class="badge-info">
            <span id="cart-count">0</span> ítems | <span id="cart-total">$0</span>
        </div>
    </button>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv';
    
    let baseDeDatos = [];
    let carrito = [];
    let mesaActual = "";

    async function cargarDatos() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const filas = data.replace(/\r/g, "").split('\n').slice(1);
            
            baseDeDatos = filas.map(f => {
                const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    cat: c[1] ? c[1].replace(/"/g, "").trim().toUpperCase() : "OTROS", // GRUPO COL B
                    nombre: c[2] ? c[2].replace(/"/g, "").trim() : "",
                    desc: c[3] ? c[3].replace(/"/g, "").trim() : "",
                    precio: c[4] ? parseFloat(c[4].replace(/[^0-9.-]+/g,"")) : 0,
                    img: c[5] ? c[5].trim() : "",
                    disp: c[6] ? c[6].toUpperCase().trim() : "",
                    wa: c[10] ? c[10].trim() : "" // WHATSAPP COL K
                };
            }).filter(p => p.nombre !== "" && p.disp === "SI");
            
            renderizar();
        } catch (e) { console.error(e); }
    }

    function renderizar() {
        const cont = document.getElementById('lista-menu');
        const nav = document.getElementById('nav-categorias');
        cont.innerHTML = ""; nav.innerHTML = "";
        
        // Obtener categorías únicas
        const categorias = [...new Set(baseDeDatos.map(p => p.cat))];
        
        categorias.forEach(cat => {
            // Crear botones de navegación
            nav.innerHTML += `<button class="cat-btn" onclick="document.getElementById('sec-${cat}').scrollIntoView({behavior:'smooth'})">${cat}</button>`;
            
            // Crear título de sección
            cont.innerHTML += `<div id="sec-${cat}" class="section-title">${cat}</div>`;
            
            // Listar productos de esa categoría
            baseDeDatos.filter(p => p.cat === cat).forEach((p, index) => {
                const prodId = `item-${cat}-${index}`;
                cont.innerHTML += `
                    <div class="producto-card" id="${prodId}" onclick="toggleSeleccion('${p.nombre}', ${p.precio}, '${prodId}')">
                        <div class="checkbox-custom"></div>
                        <img src="${p.img}" class="producto-img" onerror="this.src='https://via.placeholder.com/150?text=S/F'">
                        <div class="info">
                            <strong>${p.nombre}</strong>
                            <small>${p.desc}</small>
                            <span class="precio">$${p.precio}</span>
                        </div>
                    </div>`;
            });
        });
    }

    function toggleSeleccion(nombre, precio, id) {
        const element = document.getElementById(id);
        const pos = carrito.findIndex(i => i.nombre === nombre);

        if (pos > -1) {
            carrito.splice(pos, 1);
            element.classList.remove('selected');
        } else {
            carrito.push({nombre, precio});
            element.classList.add('selected');
        }
        actualizarBadge();
    }

    function actualizarBadge() {
        const total = carrito.reduce((sum, item) => sum + item.precio, 0);
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = `$${total.toFixed(0)}`;
    }

    function iniciarApp() {
        mesaActual = document.getElementById('mesa-selector').value;
        if(!mesaActual) return alert("Por favor, indica tu ubicación.");
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        cargarDatos();
    }

    function enviarPedido() {
        if (carrito.length === 0) return alert("El pedido está vacío.");
        
        const numWA = (baseDeDatos[0] && baseDeDatos[0].wa) ? baseDeDatos[0].wa : "54911XXXXXXXX";
        
        let emojiUbi = "🍽️";
        if (mesaActual.includes("Vereda")) emojiUbi = "☀️";
        if (mesaActual.includes("llevar")) emojiUbi = "🛍️";
        if (mesaActual.includes("Delivery")) emojiUbi = "🛵";

        let lista = `*NUEVO PEDIDO ${emojiUbi}*\n*UBICACIÓN:* ${mesaActual}\n------------------\n`;
        let total = 0;
        
        carrito.forEach(i => { 
            lista += `• ${i.nombre} ($${i.precio})\n`; 
            total += i.precio; 
        });
        
        lista += `------------------\n*TOTAL: $${total.toFixed(2)}*`;
        window.open(`https://wa.me/${numWA}?text=${encodeURIComponent(lista)}`, '_blank');
    }
</script>
</body>
</html>
