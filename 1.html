<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text);
            padding-bottom: 100px;
        }

        /* Pantalla de Bienvenida */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ai-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--primary); margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
        }

        /* Contenedor Principal */
        .app-container { max-width: 500px; margin: 0 auto; padding: 15px; display: none; }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px; text-align: center;
        }

        /* Tarjeta de Producto con Checkbox */
        .producto-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 15px; margin-bottom: 12px; padding: 12px;
            display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .producto-card.selected {
            border-color: var(--primary);
            background: rgba(46, 204, 113, 0.1);
        }

        /* Checkbox Circular */
        .checkbox-custom {
            width: 24px; height: 24px; border: 2px solid #64748b;
            border-radius: 50%; margin-right: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .selected .checkbox-custom {
            background: var(--primary); border-color: var(--primary);
        }

        .selected .checkbox-custom::after {
            content: '✓'; color: white; font-size: 14px; font-weight: bold;
        }

        .producto-img {
            width: 70px; height: 70px; border-radius: 12px;
            object-fit: cover; margin-right: 15px;
        }

        .info { flex-grow: 1; }
        .info strong { display: block; font-size: 1.1em; margin-bottom: 4px; }
        .info small { color: #94a3b8; display: block; line-height: 1.2; margin-bottom: 6px; }
        .precio { color: var(--primary); font-weight: bold; font-size: 1.1em; }

        /* Botón Flotante de WhatsApp */
        .btn-whatsapp {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 50px; font-weight: bold;
            width: 90%; max-width: 400px; z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex; justify-content: space-between; align-items: center;
        }

        .badge-count {
            background: white; color: var(--primary);
            padding: 2px 10px; border-radius: 10px; font-size: 0.9em;
        }

        select, button { cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img src="https://raw.githubusercontent.com/cursosmenos20grados/catalogo/main/moza_robot.jpg" class="ai-avatar">
    <h2 style="margin-bottom: 5px;">Bienvenido</h2>
    <p style="color: #94a3b8; margin-bottom: 25px;">Seleccione su ubicación</p>
    
    <select id="mesa-selector" style="padding:12px; background:#1e293b; color:white; border:1px solid #334155; width: 220px; border-radius: 10px;">
        <option value="">-- Ubicación --</option>
        <option value="Mesa 1">Mesa 01</option>
        <option value="Mesa 2">Mesa 02</option>
        <option value="Barra">Barra</option>
        <option value="Para llevar">Para llevar</option>
    </select><br>
    
    <button onclick="iniciarApp()" style="padding:15px 40px; background:var(--primary); color:white; border:none; font-weight:bold; border-radius:12px; margin-top:10px;">INGRESAR</button>
</div>

<div id="app" class="app-container">
    <div class="header">
        <h3 style="margin:0">Nuestro Menú</h3>
        <p style="font-size: 0.8em; color: var(--primary); margin: 5px 0 0 0;">Seleccione los productos para su pedido</p>
    </div>

    <div id="lista-menu"></div>

    <button class="btn-whatsapp" onclick="enviarPedido()">
        <span>ENVIAR PEDIDO</span>
        <span class="badge-count" id="cart-count">0</span>
    </button>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbg-JdC7bjpgQH1vwdq1m8Or_FTyZXG56lI152bs-_rjFp8yCNYnujB8CCkO_gFkmvEfczJ9uMaXzK/pub?output=csv';
    
    let baseDeDatos = [];
    let carrito = [];
    let mesaActual = "";

    async function cargarDatos() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const filas = data.replace(/\r/g, "").split('\n').slice(1);
            
            baseDeDatos = filas.map(f => {
                const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    nombre: c[2] ? c[2].replace(/"/g, "") : "",
                    desc: c[3] ? c[3].replace(/"/g, "") : "",
                    precio: c[4] ? c[4].trim() : "0",
                    img: c[5] ? c[5].trim() : "",
                    disp: c[6] ? c[6].toUpperCase().trim() : "",
                    wa: c[10] ? c[10].trim() : ""
                };
            });
            renderizar();
        } catch (e) { console.error(e); }
    }

    function renderizar() {
        const cont = document.getElementById('lista-menu');
        cont.innerHTML = "";
        
        baseDeDatos.filter(p => p.disp.includes("SI")).forEach((p, index) => {
            cont.innerHTML += `
                <div class="producto-card" id="item-${index}" onclick="toggleSeleccion('${p.nombre}', ${p.precio}, ${index})">
                    <div class="checkbox-custom"></div>
                    <img src="${p.img}" class="producto-img" onerror="this.src='https://via.placeholder.com/150?text=Comida'">
                    <div class="info">
                        <strong>${p.nombre}</strong>
                        <small>${p.desc}</small>
                        <span class="precio">$${p.precio}</span>
                    </div>
                </div>`;
        });
    }

    function toggleSeleccion(nombre, precio, index) {
        const element = document.getElementById(`item-${index}`);
        const pos = carrito.findIndex(i => i.nombre === nombre);

        if (pos > -1) {
            carrito.splice(pos, 1);
            element.classList.remove('selected');
        } else {
            carrito.push({nombre, precio});
            element.classList.add('selected');
        }
        document.getElementById('cart-count').innerText = carrito.length;
    }

    function iniciarApp() {
        mesaActual = document.getElementById('mesa-selector').value;
        if(!mesaActual) return alert("Por favor, selecciona tu mesa");
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        cargarDatos();
    }

    function enviarPedido() {
        if (carrito.length === 0) return alert("Selecciona al menos un producto.");
        
        const numWA = (baseDeDatos[0] && baseDeDatos[0].wa) ? baseDeDatos[0].wa : "54911XXXXXXXX";
        let total = 0;
        let lista = `*NUEVO PEDIDO*\n*UBICACIÓN:* ${mesaActual}\n-------------\n`;
        
        carrito.forEach(i => { 
            lista += `• ${i.nombre} ($${i.precio})\n`; 
            total += parseFloat(i.precio); 
        });
        
        lista += `-------------\n*TOTAL: $${total.toFixed(2)}*`;
        window.open(`https://wa.me/${numWA}?text=${encodeURIComponent(lista)}`, '_blank');
    }
</script>
</body>
</html>
